name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia }} / ubuntu-latest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        julia: ['1.10', '1']
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia }}
      - uses: julia-actions/cache@v2
      - name: Instantiate, precompile, and load
        run: >-
          julia --project=. --startup-file=no
          -e 'using Pkg; Pkg.instantiate(); Pkg.precompile(); using Wicked; using Wicked.API'
      - name: Run package tests
        run: >-
          julia --project=. --startup-file=no
          -e 'using Pkg; Pkg.test()'

  quality:
    name: Quality / Julia ${{ matrix.julia }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        julia: ['1.10', '1']
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia }}
      - uses: julia-actions/cache@v2
      - name: Run repository quality gate
        run: julia --project=. --startup-file=no scripts/quality_gate.jl
      - name: Run reviewed public API audit
        run: julia --project=. --startup-file=no scripts/api_audit.jl
      - name: Audit experimental promotion plans
        run: julia --project=. --startup-file=no scripts/experimental_promotion_audit.jl
      - name: Audit widget promotion requirements
        run: julia --project=. --startup-file=no scripts/widget_promotion_requirements_audit.jl
      - name: Audit widget promotion requirements schema
        run: julia --project=. --startup-file=no scripts/widget_promotion_requirements_schema_audit.jl
      - name: Render widget promotion requirements
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts
          julia --project=. --startup-file=no scripts/render_widget_promotion_requirements.jl \
            --format markdown \
            --release-required yes \
            --output ci-artifacts/widget-promotion-requirements.md
          cat ci-artifacts/widget-promotion-requirements.md
          julia --project=. --startup-file=no scripts/render_widget_promotion_requirements.jl \
            --format json \
            --release-required yes \
            --output ci-artifacts/widget-promotion-requirements.json
          cat ci-artifacts/widget-promotion-requirements.json
      - name: Render reference parity matrix
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts
          julia --project=. --startup-file=no scripts/render_reference_parity_matrix.jl \
            --format markdown \
            --output ci-artifacts/reference-parity-matrix.md
          cat ci-artifacts/reference-parity-matrix.md
          julia --project=. --startup-file=no scripts/render_reference_parity_matrix.jl \
            --format markdown \
            --columns family,status,follow_up \
            --output ci-artifacts/reference-parity-review.md
          cat ci-artifacts/reference-parity-review.md
          julia --project=. --startup-file=no scripts/render_reference_parity_matrix.jl \
            --blocking-only \
            --format markdown \
            --columns family,status,follow_up \
            --output ci-artifacts/reference-parity-blocking.md
          cat ci-artifacts/reference-parity-blocking.md
          julia --project=. --startup-file=no scripts/render_reference_parity_matrix.jl \
            --blocking-only \
            --format json \
            --output ci-artifacts/reference-parity-blocking.json
          cat ci-artifacts/reference-parity-blocking.json
          julia --project=. --startup-file=no scripts/render_reference_parity_matrix.jl \
            --format markdown \
            --status adapted \
            --columns family,status,follow_up \
            --output ci-artifacts/reference-parity-adapted.md
          cat ci-artifacts/reference-parity-adapted.md
          julia --project=. --startup-file=no scripts/render_reference_parity_matrix.jl \
            --format json \
            --status adapted \
            --output ci-artifacts/reference-parity-adapted.json
          cat ci-artifacts/reference-parity-adapted.json
          julia --project=. --startup-file=no scripts/render_reference_parity_matrix.jl \
            --format markdown \
            --family "Remote delivery" \
            --output ci-artifacts/reference-parity-remote-delivery.md
          cat ci-artifacts/reference-parity-remote-delivery.md
          julia --project=. --startup-file=no scripts/render_reference_parity_matrix.jl \
            --format json \
            --family "Remote delivery" \
            --output ci-artifacts/reference-parity-remote-delivery.json
          cat ci-artifacts/reference-parity-remote-delivery.json
          julia --project=. --startup-file=no scripts/render_reference_parity_matrix.jl \
            --summary \
            --format tsv \
            --output ci-artifacts/reference-parity-summary.tsv
          cat ci-artifacts/reference-parity-summary.tsv
          julia --project=. --startup-file=no scripts/render_reference_parity_matrix.jl \
            --summary \
            --format json \
            --output ci-artifacts/reference-parity-summary.json
          cat ci-artifacts/reference-parity-summary.json
          julia --project=. --startup-file=no scripts/render_reference_parity_matrix.jl \
            --format json \
            --output ci-artifacts/reference-parity-matrix.json
          cat ci-artifacts/reference-parity-matrix.json
          julia --project=. --startup-file=no scripts/render_reference_parity_matrix.jl \
            --release-status \
            --require-release-ready \
            --output ci-artifacts/reference-parity-matrix-status.txt
          cat ci-artifacts/reference-parity-matrix-status.txt
          julia --project=. --startup-file=no scripts/render_reference_parity_matrix.jl \
            --release-status-json \
            --output ci-artifacts/reference-parity-matrix-status.json
          cat ci-artifacts/reference-parity-matrix-status.json
          julia --project=. --startup-file=no scripts/parity_closeout_audit.jl \
            --report markdown \
            --output ci-artifacts/parity-closeout-requirements.md
          cat ci-artifacts/parity-closeout-requirements.md
          julia --project=. --startup-file=no scripts/parity_closeout_audit.jl \
            --status \
            --output ci-artifacts/parity-closeout-requirements-status.txt
          cat ci-artifacts/parity-closeout-requirements-status.txt
          julia --project=. --startup-file=no scripts/parity_closeout_audit.jl \
            --report tsv \
            --output ci-artifacts/parity-closeout-requirements.tsv
          cat ci-artifacts/parity-closeout-requirements.tsv
          julia --project=. --startup-file=no scripts/parity_closeout_audit.jl \
            --report json \
            --output ci-artifacts/parity-closeout-requirements.json
          cat ci-artifacts/parity-closeout-requirements.json
          julia --project=. --startup-file=no scripts/parity_closeout_audit.jl \
            --report markdown \
            --family "remote delivery" \
            --output ci-artifacts/parity-closeout-remote-delivery.md
          cat ci-artifacts/parity-closeout-remote-delivery.md
      - name: Audit reference parity matrix schema
        run: julia --project=. --startup-file=no scripts/reference_parity_matrix_schema_audit.jl
      - name: Run widget stabilization gate
        run: julia --project=. --startup-file=no scripts/widget_stabilization_gate.jl
      - name: Audit public widget candidate surface
        run: julia --project=. --startup-file=no scripts/public_widget_candidate_audit.jl
      - name: Audit stable widget family evidence
        run: julia --project=. --startup-file=no scripts/widget_family_evidence_audit.jl
      - name: Render stable widget coverage report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts
          coverage_status=0
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --coverage-status \
            --output ci-artifacts/stable-widget-coverage-status.txt
          cat ci-artifacts/stable-widget-coverage-status.txt
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --coverage-summary \
            --format tsv \
            --require-complete-coverage \
            --output ci-artifacts/stable-widget-coverage-summary.tsv || coverage_status=$?
          cat ci-artifacts/stable-widget-coverage-summary.tsv
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --coverage-summary-json \
            --output ci-artifacts/stable-widget-coverage-summary.json
          cat ci-artifacts/stable-widget-coverage-summary.json
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --coverage-gaps \
            --format markdown \
            --output ci-artifacts/stable-widget-coverage-gaps.md
          cat ci-artifacts/stable-widget-coverage-gaps.md
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --coverage-issue missing_record \
            --format markdown \
            --output ci-artifacts/stable-widget-coverage-missing-records.md
          cat ci-artifacts/stable-widget-coverage-missing-records.md
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --coverage-issue-names missing_record \
            --output ci-artifacts/stable-widget-coverage-missing-record-names.txt
          cat ci-artifacts/stable-widget-coverage-missing-record-names.txt
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --coverage-issue source_mismatch \
            --format markdown \
            --output ci-artifacts/stable-widget-coverage-source-mismatches.md
          cat ci-artifacts/stable-widget-coverage-source-mismatches.md
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --coverage-issue-names source_mismatch \
            --output ci-artifacts/stable-widget-coverage-source-mismatch-names.txt
          cat ci-artifacts/stable-widget-coverage-source-mismatch-names.txt
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --coverage-issue missing_checks \
            --format markdown \
            --output ci-artifacts/stable-widget-coverage-missing-checks.md
          cat ci-artifacts/stable-widget-coverage-missing-checks.md
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --coverage-issue-names missing_checks \
            --output ci-artifacts/stable-widget-coverage-missing-check-names.txt
          cat ci-artifacts/stable-widget-coverage-missing-check-names.txt
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --stability \
            --columns name,family,ready,blockers \
            --output ci-artifacts/stable-widget-stability.md
          cat ci-artifacts/stable-widget-stability.md
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --stability-gaps \
            --columns name,family,ready,blockers \
            --output ci-artifacts/stable-widget-stability-gaps.md
          cat ci-artifacts/stable-widget-stability-gaps.md
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --stability-json \
            --output ci-artifacts/stable-widget-stability.json
          cat ci-artifacts/stable-widget-stability.json
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --stabilization-status \
            --output ci-artifacts/stable-widget-stabilization-status.txt
          cat ci-artifacts/stable-widget-stabilization-status.txt
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --stabilization-json \
            --output ci-artifacts/stable-widget-stabilization.json
          cat ci-artifacts/stable-widget-stabilization.json
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --surface-release-status \
            --output ci-artifacts/stable-widget-surface-release-status.txt
          cat ci-artifacts/stable-widget-surface-release-status.txt
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --surface-release-json \
            --output ci-artifacts/stable-widget-surface-release.json
          cat ci-artifacts/stable-widget-surface-release.json
          julia --project=. --startup-file=no scripts/render_widget_catalog.jl \
            --stability \
            --require-stability-ready >/dev/null || coverage_status=$?
          exit "${coverage_status}"
      - name: Render widget family closeout report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts
          closeout_status=0
          expected_family_count="$(
            julia --project=. --startup-file=no scripts/render_widget_family_closeout.jl --count
          )"
          printf 'Expected widget family count: %s\n' "${expected_family_count}"
          julia --project=. --startup-file=no scripts/render_widget_family_closeout.jl \
            --format markdown \
            --columns family,status,docs,examples,blockers,blocker_details \
            --release-check \
            --require-total-count "${expected_family_count}" \
            --output ci-artifacts/widget-family-closeout.md || closeout_status=$?
          cat ci-artifacts/widget-family-closeout.md
          julia --project=. --startup-file=no scripts/render_widget_family_closeout.jl \
            --summary \
            --format tsv \
            --output ci-artifacts/widget-family-closeout-summary.tsv
          cat ci-artifacts/widget-family-closeout-summary.tsv
          julia --project=. --startup-file=no scripts/render_widget_family_closeout.jl \
            --format json \
            --output ci-artifacts/widget-family-closeout.json
          cat ci-artifacts/widget-family-closeout.json
          exit "${closeout_status}"
      - name: Audit widget family closeout schema
        run: julia --project=. --startup-file=no scripts/widget_family_closeout_schema_audit.jl
      - name: Audit stable widget coverage schema
        run: julia --project=. --startup-file=no scripts/stable_widget_coverage_schema_audit.jl
      - name: Audit stable widget stability schema
        run: julia --project=. --startup-file=no scripts/stable_widget_stability_schema_audit.jl
      - name: Audit stable widget stabilization schema
        run: julia --project=. --startup-file=no scripts/stable_widget_stabilization_schema_audit.jl
      - name: Audit stable widget surface release schema
        run: julia --project=. --startup-file=no scripts/stable_widget_surface_release_schema_audit.jl
      - name: Upload widget family closeout report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: widget-family-closeout-${{ matrix.julia }}
          path: |
            ci-artifacts/widget-family-closeout.md
            ci-artifacts/widget-family-closeout-summary.tsv
            ci-artifacts/widget-family-closeout.json
          if-no-files-found: error
      - name: Upload stable widget coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stable-widget-coverage-${{ matrix.julia }}
          path: |
            ci-artifacts/stable-widget-coverage-status.txt
            ci-artifacts/stable-widget-coverage-summary.tsv
            ci-artifacts/stable-widget-coverage-summary.json
            ci-artifacts/stable-widget-coverage-gaps.md
            ci-artifacts/stable-widget-coverage-missing-records.md
            ci-artifacts/stable-widget-coverage-missing-record-names.txt
            ci-artifacts/stable-widget-coverage-source-mismatches.md
            ci-artifacts/stable-widget-coverage-source-mismatch-names.txt
            ci-artifacts/stable-widget-coverage-missing-checks.md
            ci-artifacts/stable-widget-coverage-missing-check-names.txt
            ci-artifacts/stable-widget-stability.md
            ci-artifacts/stable-widget-stability-gaps.md
            ci-artifacts/stable-widget-stability.json
            ci-artifacts/stable-widget-stabilization-status.txt
            ci-artifacts/stable-widget-stabilization.json
            ci-artifacts/stable-widget-surface-release-status.txt
            ci-artifacts/stable-widget-surface-release.json
            ci-artifacts/widget-promotion-requirements.md
            ci-artifacts/widget-promotion-requirements.json
            ci-artifacts/reference-parity-matrix.md
            ci-artifacts/reference-parity-review.md
            ci-artifacts/reference-parity-blocking.md
            ci-artifacts/reference-parity-blocking.json
            ci-artifacts/reference-parity-adapted.md
            ci-artifacts/reference-parity-adapted.json
            ci-artifacts/reference-parity-remote-delivery.md
            ci-artifacts/reference-parity-remote-delivery.json
            ci-artifacts/reference-parity-summary.tsv
            ci-artifacts/reference-parity-summary.json
            ci-artifacts/reference-parity-matrix.json
            ci-artifacts/reference-parity-matrix-status.txt
            ci-artifacts/reference-parity-matrix-status.json
            ci-artifacts/parity-closeout-requirements.md
            ci-artifacts/parity-closeout-requirements-status.txt
            ci-artifacts/parity-closeout-requirements.tsv
            ci-artifacts/parity-closeout-requirements.json
            ci-artifacts/parity-closeout-remote-delivery.md
          if-no-files-found: error
      - name: Audit Unicode width corpus
        run: julia --project=. --startup-file=no scripts/unicode_width_corpus_audit.jl
      - name: Audit remote protocol fixtures
        run: julia --project=. --startup-file=no scripts/remote_protocol_fixture_audit.jl
      - name: Audit real-terminal matrix shape
        run: julia --project=. --startup-file=no scripts/real_terminal_matrix_audit.jl
      - name: Audit terminal evidence records
        run: julia --project=. --startup-file=no scripts/terminal_evidence_audit.jl
      - name: Audit real application evidence records
        run: julia --project=. --startup-file=no scripts/application_evidence_audit.jl
      - name: Audit benchmark evidence records
        run: julia --project=. --startup-file=no scripts/benchmark_evidence_audit.jl
      - name: Audit package loading evidence records
        run: julia --project=. --startup-file=no scripts/loading_evidence_audit.jl
      - name: Audit documentation evidence records
        run: julia --project=. --startup-file=no scripts/documentation_evidence_audit.jl
      - name: Audit semantic accessibility evidence records
        run: julia --project=. --startup-file=no scripts/semantic_accessibility_evidence_audit.jl
      - name: Audit pilot evidence packages
        run: julia --project=. --startup-file=no scripts/pilot_evidence_package_audit.jl
      - name: Audit public examples
        run: julia --project=. --startup-file=no scripts/public_examples_audit.jl
      - name: Audit public example families
        run: julia --project=. --startup-file=no scripts/example_family_audit.jl
      - name: Audit parity evidence policy
        run: julia --project=. --startup-file=no scripts/parity_policy_audit.jl
      - name: Audit parity evidence records
        run: julia --project=. --startup-file=no scripts/parity_closeout_audit.jl

  documentation:
    name: Documenter manual / Julia ${{ matrix.julia }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        julia: ['1.10', '1']
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia }}
      - uses: julia-actions/cache@v2
      - name: Instantiate documentation environment
        run: >-
          julia --project=docs --startup-file=no
          -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build strict documentation
        run: julia --project=docs --startup-file=no docs/make.jl

  http-extension:
    name: HTTP WebSocket extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Test optional HTTP extension in an isolated environment
        run: >-
          julia --startup-file=no
          -e 'using Pkg; Pkg.activate(; temp=true); Pkg.develop(path=pwd());
          Pkg.add(PackageSpec(name="HTTP", version="2"));
          using Test, Wicked, HTTP; include("test/http_websocket_extension.jl")'
      - name: Check browser client syntax
        run: node --check assets/remote/wicked-remote.js

  terminal-pty:
    name: Terminal PTY / ubuntu-latest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Instantiate and precompile
        run: >-
          julia --project=. --startup-file=no
          -e 'using Pkg; Pkg.instantiate(); Pkg.precompile(); using Wicked; using Wicked.API'
      - name: Run real pseudo-terminal lifecycle scenarios
        run: julia --project=. --startup-file=no scripts/pty_gate.jl

  examples:
    name: Executable examples
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Run examples independently
        shell: bash
        run: |
          set -euo pipefail
          for example in examples/*.jl; do
            echo "Running ${example}"
            julia --project=. --startup-file=no "${example}"
          done

  benchmark:
    name: Allocation budgets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Run quick benchmark gate
        run: julia --project=. --startup-file=no benchmark/run.jl --quick --check
